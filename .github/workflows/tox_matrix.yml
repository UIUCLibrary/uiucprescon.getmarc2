on: [push, pull_request]
name: Tox Multi-platform Compatibility Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tox_test_matrix: ${{ steps.pythonVersions.outputs.myoutput }}
      tox_lint_matrix: ${{ steps.ToxLintEnvironments.outputs.myoutput }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        name: Install uv
        with:
          cache: 'pip'
          python-version: '3.13'
      - id: pythonVersions
        name: Get tox test environments
        run: |
          python -m pip install uv
          echo "myoutput=$(uv run --only-group=tox --quiet tox list -d --no-desc | sed -E 's/(.*py)([0-9])([0-9]+)/\2.\3/' | jq  --raw-input . | jq -c --slurp)" >> $GITHUB_OUTPUT
      - id: ToxLintEnvironments
        name: Get tox lint environments
        run: |
          echo "myoutput=$(uv run --only-group=tox --quiet tox list -m lint --no-desc | jq  --raw-input . | jq -c --slurp)" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJson(needs.setup.outputs.tox_test_matrix) }}
      fail-fast: false
    name: "Tox environment: py [Using Python ${{ matrix.python-version }} on ${{ matrix.os }}]"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # caching pip dependencies
      - name: Install requirements
        run: |
          pip install uv
      - name: Run tox
        run: uv run --only-group tox --with tox-uv --frozen tox -e py -vvv
  lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lint-environment: ${{ fromJson(needs.setup.outputs.tox_lint_matrix) }}
      fail-fast: false
    name: "Tox environment: ${{ matrix.lint-environment }}"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip' # caching pip dependencies
      - name: Install requirements
        run: |
          pip install uv
      - name: Run tox
        run: uv run --only-group tox --with tox-uv --frozen tox -e ${{ matrix.lint-environment }}